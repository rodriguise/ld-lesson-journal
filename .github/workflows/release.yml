name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build blocks
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease
        id: prerelease
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ "$TAG" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package plugin
        run: |
          mkdir -p dist/lesson-journal
          cp -r src/assets dist/lesson-journal/
          cp -r src/blocks dist/lesson-journal/
          cp -r src/build dist/lesson-journal/
          cp -r src/includes dist/lesson-journal/
          cp src/lesson-journal.php dist/lesson-journal/
          cp src/uninstall.php dist/lesson-journal/
          cp LICENSE dist/lesson-journal/
          cp README.md dist/lesson-journal/
          cd dist && zip -r ../lesson-journal-${{ steps.version.outputs.tag }}.zip lesson-journal/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lesson-journal-${{ steps.version.outputs.tag }}.zip
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
